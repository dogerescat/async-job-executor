services:
  localstack:
    image: localstack/localstack:latest
    container_name: localstack
    ports:
      - '4566:4566'
    environment:
      - SERVICES=sqs
      - AWS_DEFAULT_REGION=ap-northeast-1
      # Use path-style URLs so curl/AWS SDK can hit http://localhost:4566/ACCOUNT_ID/queue-name
      # and avoid region-mismatch hostnames like sqs.us-east-1.localhost.localstack.cloud
      - SQS_ENDPOINT_STRATEGY=path
    volumes:
      - ./localstack:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
